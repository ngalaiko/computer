[tools]
gh = "2.96.0"
regctl = "0.11.5"
jj = "0.43.0"

[env]
IMAGE = "ghcr.io/ngalaiko/computer.exe"
TAG = "latest"
GHCR_USER = "ngalaiko"
GHCR_TOKEN = "{{ env.GHCR_TOKEN | default(value=exec(command='gh auth token 2>/dev/null || true')) }}"
GIT_SHA = "{{ exec(command='git rev-parse --short HEAD') }}"
JJ_REV = "{{ exec(command='jj log --no-graph -r \"trunk()\" -T \"change_id.short()\"') }}"

[tasks."ghr:auth"]
description = "Grant gh the write:packages scope (once, for GHCR pushes)"
run = '''
set -eu
if gh auth status -h github.com >/dev/null 2>&1; then
  gh auth refresh -h github.com -s write:packages
else
  gh auth login -h github.com -s write:packages -w
fi
'''

[tasks."exedev:build:aarch64"]
description = "Build the aarch64-linux exedev image -> dist/"
run = '''
set -eu
mkdir -p dist
nix build .#packages.aarch64-linux.exedev \
  -o dist/computer.exe.aarch64-linux.tar.gz --print-build-logs
'''

[tasks."exedev:build:x86"]
description = "Build the x86_64-linux exedev image -> dist/"
run = '''
set -eu
mkdir -p dist
nix build .#packages.x86_64-linux.exedev \
  -o dist/computer.exe.x86_64-linux.tar.gz --print-build-logs
'''

[tasks."exedev:push:aarch64"]
description = "Build + push the aarch64 exedev image to $IMAGE:$TAG-arm64"
depends = ["exedev:build:aarch64"]
run = '''
set -eu
nix run nixpkgs#skopeo -- --insecure-policy copy \
  --dest-creds "${GHCR_USER}:${GHCR_TOKEN}" \
  docker-archive:dist/computer.exe.aarch64-linux.tar.gz \
  "docker://${IMAGE}:${TAG}-arm64"
'''

[tasks."exedev:push:x86"]
description = "Build + push the x86_64 exedev image to $IMAGE:$TAG-amd64"
depends = ["exedev:build:x86"]
run = '''
set -eu
nix run nixpkgs#skopeo -- --insecure-policy copy \
  --dest-creds "${GHCR_USER}:${GHCR_TOKEN}" \
  docker-archive:dist/computer.exe.x86_64-linux.tar.gz \
  "docker://${IMAGE}:${TAG}-amd64"
'''

[tasks."exedev:push:manifest"]
description = "Stitch the multi-arch $TAG manifest + git sha / jj rev tags (arch images must already be pushed)"
run = '''
set -eu
printf "%s" "$GHCR_TOKEN" | regctl registry login ghcr.io -u "$GHCR_USER" --pass-stdin
regctl index create "$IMAGE:$TAG" \
  --ref "$IMAGE:$TAG-amd64" \
  --ref "$IMAGE:$TAG-arm64"
for t in "${GIT_SHA:-}" "${JJ_REV:-}"; do
  [ -n "$t" ] || continue
  regctl image copy "$IMAGE:$TAG" "$IMAGE:$t"
done
regctl registry logout ghcr.io || true
'''

[tasks."exedev"]
description = "Build + push both arches, then stitch the multi-arch manifest"
run = [
	{ tasks = [ "exedev:push:aarch64", "exedev:push:x86" ] },
	{ task = "exedev:push:manifest" },
]
