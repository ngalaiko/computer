name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build + push ${{ matrix.system }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { system: x86_64-linux, runner: ubuntu-24.04 }
          - { system: aarch64-linux, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Build + push ${{ matrix.system }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#push-image -- ${{ matrix.system }}

  manifest:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          # full history so jj can derive the trunk change id
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Stitch manifest + tags
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#push-manifest
