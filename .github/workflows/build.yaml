name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Flake check + format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v35
      - run: nix flake check --all-systems
      - run: nix fmt . && git diff --exit-code

  build:
    name: Build + push ${{ matrix.system }}
    needs: check
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { system: x86_64-linux, runner: ubuntu-24.04 }
          - { system: aarch64-linux, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v5
      # single-user install: /nix is owned by the runner, so it can be cached.
      - uses: nixbuild/nix-quick-install-action@v35
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ matrix.system }}-${{ hashFiles('flake.lock', 'flake.nix', 'modules/**', 'packages/**') }}
          restore-prefixes-first-match: nix-${{ matrix.system }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-${{ matrix.system }}-
          purge-created: 0
          purge-primary-key: never
      - name: Build + push ${{ matrix.system }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # out-link roots the image closure so the pre-save GC keeps it.
          nix build .#packages.${{ matrix.system }}.exedev --out-link /tmp/image
          nix run .#push-image -- ${{ matrix.system }}

  manifest:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: nixbuild/nix-quick-install-action@v35
      - name: Stitch manifest + tags
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#push-manifest
